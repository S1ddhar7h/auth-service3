# ===============================
# APPLICATION
# ===============================
spring.application.name=auth-service-3
server.port=8082

# ===============================
# DATABASE (MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/auth_service_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=auth_user
spring.datasource.password=auth_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Recommended for Hibernate 6 (Boot 3)
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ===============================
# SPRING SECURITY
# ===============================
# Default generated user disable (since custom auth is used)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
logging.level.org.springframework.security=DEBUG
# ===============================
# JWT CONFIG (Custom)
# ===============================
jwt.secret=THIS_IS_A_SUPER_LONG_PRODUCTION_SECRET_KEY_CHANGE_IN_PROD_1234567890
jwt.access-expiration=900000
jwt.refresh-expiration=604800000

# ===============================
# LOGGING
# ===============================

# Security logs (use DEBUG only while testing)
//logging.level.org.springframework.security=INFO

# SQL logs (disable in production)
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.orm.jdbc.bind=INFO

# Application log level
logging.level.root=INFO
logging.level.com.authservice=DEBUG
jwt.expiration=5000

# Optional: Log file output
logging.file.name=logs/auth-service.log


spring.redis.host=localhost
spring.redis.port=6379


spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=yourgmail@gmail.com
spring.mail.password=APP_PASSWORD_HERE
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true